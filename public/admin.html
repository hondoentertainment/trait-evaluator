<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Profile Read</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Space+Grotesk:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--ink:#171310;--paper:#f6efe4;--card:#fffdf8;--plum:#5b2a86;--muted:#7a6f60;--rule:#d8cdba}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding:24px;line-height:1.45}
  .wrap{max-width:900px;margin:0 auto}
  h1{font-family:'Fraunces',serif;font-size:36px;margin:8px 0 16px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  input,button{border:1.5px solid var(--ink);padding:10px 12px;font:inherit}
  button{background:#c3e600;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
  .stat{border:1.5px solid var(--ink);background:var(--card);padding:14px}
  .stat b{display:block;font-family:'Fraunces',serif;font-size:28px}
  .stat span{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  pre{background:var(--ink);color:#f6efe4;padding:14px;overflow:auto;font-size:12px;max-height:360px}
  .err{color:#ff5c49;margin:10px 0}
  a{color:var(--plum)}
</style>
</head>
<body>
<div class="wrap">
  <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--plum);letter-spacing:.14em;text-transform:uppercase">Profile Read · ops</div>
  <h1>Telemetry admin</h1>
  <p style="color:var(--muted);margin-bottom:14px">Paste <code>ADMIN_SECRET</code> (stored only in this browser). <a href="/">← Home</a></p>
  <div class="row">
    <input id="key" type="password" placeholder="ADMIN_SECRET" style="flex:1;min-width:200px">
    <button type="button" id="load">Load</button>
  </div>
  <div class="err" id="err"></div>
  <div class="grid" id="stats"></div>
  <h2 style="font-family:'Fraunces',serif;margin:8px 0">Aggregate JSON</h2>
  <pre id="out">{}</pre>
</div>
<script type="module">
const keyEl = document.getElementById("key");
const err = document.getElementById("err");
const stats = document.getElementById("stats");
const out = document.getElementById("out");
keyEl.value = localStorage.getItem("profileRead.adminKey") || "";

document.getElementById("load").onclick = async () => {
  err.textContent = "";
  const key = keyEl.value.trim();
  localStorage.setItem("profileRead.adminKey", key);
  try {
    const res = await fetch(`/api/admin?key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "Failed");
    const a = data.aggregate || {};
    const t = data.today || {};
    const cells = [
      ["Deals", a.deals || 0],
      ["Thumbs up", a.thumbsUp || 0],
      ["Thumbs down", a.thumbsDown || 0],
      ["OCR fail", a.ocrFail || 0],
      ["Today events", Object.values(t).reduce((s, n) => s + n, 0)],
      ["Band high", a.bands?.high ?? "—"],
      ["Band low", a.bands?.low ?? "—"],
    ];
    stats.innerHTML = cells
      .map(([l, v]) => `<div class="stat"><b>${v}</b><span>${l}</span></div>`)
      .join("");
    out.textContent = JSON.stringify(
      { day: data.day, today: t, verdicts: a.verdicts, aggregate: a, sample: data.eventsSample },
      null,
      2
    );
  } catch (e) {
    err.textContent = e.message || "Error";
  }
};
</script>
</body>
</html>
