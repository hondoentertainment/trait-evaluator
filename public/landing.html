<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared shoe · Profile Read</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Space+Grotesk:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--ink:#171310;--paper:#f6efe4;--lime:#c3e600;--coral:#ff5c49;--muted:#7a6f60;--plum:#5b2a86}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:grid;place-items:center;padding:24px;
    font-family:'Space Grotesk',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(ellipse 70% 50% at 20% 0%,#efe2c8,transparent 55%),var(--paper);
  }
  .card{max-width:420px;width:100%;border:1.5px solid var(--ink);background:#171310;color:#f6efe4;padding:28px;box-shadow:8px 8px 0 var(--plum)}
  .eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#b6ab99;margin-bottom:14px}
  .word{font-family:'Fraunces',serif;font-weight:900;font-size:72px;line-height:1;color:var(--lime)}
  .word.bust{color:var(--coral)}.word.stand{color:#f6efe4}
  .meta{font-family:'Space Mono',monospace;font-size:13px;color:#b6ab99;margin:14px 0 22px;line-height:1.5}
  .actions{display:flex;flex-wrap:wrap;gap:10px}
  a,button{
    border:1.5px solid #f6efe4;background:var(--lime);color:var(--ink);padding:12px 16px;
    font-weight:700;text-decoration:none;cursor:pointer;font:inherit;box-shadow:3px 3px 0 #000
  }
  a.ghost,button.ghost{background:transparent;color:#f6efe4}
  .err{color:var(--coral);font-family:'Space Mono',monospace;font-size:13px}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="eyebrow">Profile Read · shared shoe</div>
  <div class="word" id="word">…</div>
  <div class="meta" id="meta">Loading verdict…</div>
  <div class="actions" id="actions" style="display:none">
    <a id="open" href="/">Open crosswalk →</a>
    <a class="ghost" id="compare" href="/compare">Compare</a>
    <button type="button" class="ghost" id="shareNative">Share</button>
  </div>
</div>
<script type="module">
import { shareLink } from "/js/native-share.js";

const params = new URLSearchParams(location.search);
const sid = params.get("sid") || params.get("id") || "";
const wordEl = document.getElementById("word");
const meta = document.getElementById("meta");
const actions = document.getElementById("actions");
const open = document.getElementById("open");
const compare = document.getElementById("compare");

function cls(word) {
  if (word === "BUST") return "bust";
  if (word === "STAND") return "stand";
  return "";
}

try {
  if (!sid) throw new Error("missing");
  const res = await fetch(`/api/share?id=${encodeURIComponent(sid)}`);
  if (!res.ok) throw new Error("gone");
  const deal = await res.json();
  const items = deal.items || [];
  let running = 0;
  items.forEach((it) => (running += Number(it.count) || 0));
  const n = items.length || 1;
  const tc = running / Math.max(n / 5, 0.5);
  const word = deal.verdict?.word || (tc >= 0.5 ? "HIT" : tc > -1.5 ? "STAND" : "BUST");
  const tcLabel = (tc >= 0 ? "+" : "") + tc.toFixed(1);
  wordEl.textContent = word;
  wordEl.className = "word " + cls(word);
  meta.textContent = `${n} cards · running ${running > 0 ? "+" + running : running} · true ${tcLabel}${deal.name ? " · " + deal.name : ""}`;
  document.title = `${word} · TC ${tcLabel} · Profile Read`;
  open.href = `/crosswalk?sid=${encodeURIComponent(sid)}`;
  compare.href = `/compare?asid=${encodeURIComponent(sid)}`;
  actions.style.display = "flex";
  document.getElementById("shareNative").onclick = () =>
    shareLink({
      url: location.origin + "/s/" + sid,
      title: `${word} · Profile Read`,
      text: `True count ${tcLabel} — ${word}`,
    });
} catch {
  wordEl.textContent = "GONE";
  wordEl.className = "word bust";
  meta.innerHTML = '<span class="err">Share expired or revoked.</span> <a class="ghost" href="/" style="display:inline-block;margin-top:12px">Home</a>';
}
</script>
</body>
</html>
