<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short share · Profile Read</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0;url=/">
<script>
// Production short links use vercel rewrite → /api/go?id=:id (302 to crosswalk).
// This file is a fallback if /s/:id is ever served as static HTML.
const parts = location.pathname.split("/").filter(Boolean);
const id = parts[parts.length - 1];
if (id && id !== "s") {
  location.replace("/api/go?id=" + encodeURIComponent(id));
} else {
  location.replace("/");
}
</script>
</head>
<body>
<p><a href="/">Profile Read</a></p>
</body>
</html>
